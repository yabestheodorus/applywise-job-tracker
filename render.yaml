# Render Blueprint for the NestJS API. (Deploy the Next.js web app on Vercel.)
# Set the secret env vars in the Render dashboard — they're marked sync:false.
services:
  - type: web
    name: applywise-api
    runtime: node
    plan: free
    buildCommand: npm install && npx turbo run build --filter=api
    startCommand: node apps/api/dist/main.js
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_JWKS_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
